name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

# Cancel redundant runs on same branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # 1. Lint – auto-fixes and commits back to PR
  # ─────────────────────────────────────────────
  lint:
    name: Lint & Auto-fix
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      fixed: ${{ steps.autocommit.outputs.changes_detected }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Checkout the PR branch so we can push fixes back
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - name: Install deps
        working-directory: client
        run: npm ci --prefer-offline 2>/dev/null || npm install

      - name: Run ESLint with auto-fix
        working-directory: client
        run: npx eslint src --fix --ext .js,.jsx,.ts,.tsx || true

      - name: Commit auto-fixes back to branch
        id: autocommit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "fix: auto-fix lint errors [skip ci]"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"

      - name: Lint must now pass cleanly
        working-directory: client
        run: npx eslint src --ext .js,.jsx,.ts,.tsx --max-warnings 0

  # ─────────────────────────────────────────────
  # 2. Build
  # ─────────────────────────────────────────────
  build:
    name: Build
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install deps
        working-directory: client
        run: npm ci --prefer-offline 2>/dev/null || npm install

      - name: Build
        working-directory: client
        run: npm run build
        env:
          CI: false          # CRA treats warnings as errors when CI=true
          GENERATE_SOURCEMAP: false

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: client/build
          retention-days: 1

  # ─────────────────────────────────────────────
  # 3. Link / 404 checker
  # ─────────────────────────────────────────────
  check-404:
    name: Check for 404s
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: build

      - name: Install serve + linkinator
        run: npm install -g serve linkinator

      - name: Serve build and check all internal links
        run: |
          serve build -p 3001 &
          SERVER_PID=$!
          sleep 4

          # Run linkinator – fail on any 404/5xx on localhost
          linkinator http://localhost:3001 \
            --recurse \
            --timeout 8000 \
            --retry 2 \
            --format CSV \
            --output link-report.csv || LINK_EXIT=$?

          kill $SERVER_PID 2>/dev/null || true

          if [ -n "$LINK_EXIT" ] && [ "$LINK_EXIT" != "0" ]; then
            echo "::error::Broken links detected – see link-report.csv artifact"
            exit 1
          fi

      - name: Upload link report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: link-report
          path: link-report.csv
          retention-days: 7
