name: ZTE Auto-Deploy

on:
  push:
    branches-ignore:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      vercel_project_id:
        description: "Override Vercel Project ID"
        required: false
      target_env:
        description: "Target environment"
        required: false
        default: "production"
        type: choice
        options: [production, staging, preview]

env:
  VERCEL_PROJECT_ID: "prj_fIPPRU9jPzcgPKa2I97GTGsLb8tG"
  VERCEL_TEAM_ID: "team_2MkWeFBaSCv7DOvEy0OlX4s3"
  VERCEL_ORG_ID: "team_2MkWeFBaSCv7DOvEy0OlX4s3"
  NODE_VERSION: "20"
  BEAD_ID: "ZTE-${{ github.run_id }}"

jobs:
  build_and_deploy:
    name: "Build & Deploy to Vercel"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm install

      - name: Build
        working-directory: client
        run: npm run build
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel config
        working-directory: client
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ env.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ env.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel
        working-directory: client
        run: |
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tee deploy-output.txt
          DEPLOY_URL=$(grep -oP 'https://[^\s]+\.vercel\.app' deploy-output.txt | head -1)
          echo "DEPLOY_URL=${DEPLOY_URL}" >> $GITHUB_ENV
          echo "Deployed to: ${DEPLOY_URL}"
        env:
          VERCEL_ORG_ID: ${{ env.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ env.VERCEL_PROJECT_ID }}

      - name: Health Check
        if: env.DEPLOY_URL != ''
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ env.DEPLOY_URL }}" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 5 attempts"
          exit 1
